name: Auto Tarot Bot Threads

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Quan trọng: Cấp thêm quyền GITHUB_TOKEN trực tiếp tại đây cho chắc chắn
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Dòng này giúp nó có quyền đẩy code
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Upgrade Pip & Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      -- name: Run Bot Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python bot.py

      - name: Commit & Push State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tarot_state.json
          git commit -m "Auto update tarot state [skip ci]" || exit 0
          git push
